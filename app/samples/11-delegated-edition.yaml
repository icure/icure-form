form: demo.delegated-edition
id: 10000011-0000-0000-0000-000000000011
description: Token field whose edition is delegated to a host action.
translations:
  - language: fr
    translations:
      Allergies (click to add): Allergies (cliquez pour ajouter)
      Token count: Nombre de tokens
      Reset allergies: Réinitialiser les allergies
  - language: nl
    translations:
      Allergies (click to add): Allergieën (klik om toe te voegen)
      Token count: Aantal tokens
      Reset allergies: Allergieën wissen
sections:
  - section: Delegated edition
    fields:
      - group: line
        borderless: true
        span: 24
        fields:
          - field: allergies
            type: token-field
            shortLabel: Allergies (click to add)
            span: 18
            multiline: true
            rowSpan: 3
            delegatedEdition: true
            event: edit-allergies
          - field: allergyCount
            type: number-field
            shortLabel: Token count
            span: 6
            readonly: true
            computedProperties:
              value: |
                // Tokens-list stores one FieldValue per token, so the count is just
                // the length of self['allergies']. parseContent only handles the first.
                return { content: { '*': { type: 'number', value: (self['allergies'] ?? []).length } }, codes: [] }
      - group: line
        borderless: true
        span: 24
        fields:
          - field: Reset allergies
            type: action
            shortLabel: reset-allergies
            span: 8
            event: reset-allergies
      - field: "Demonstrates the delegatedEdition flag. When set on a token-field, clicks no longer open the inline editor — they fire the host actionListener with the field's `event` name. Clicking an EXISTING token passes `{ valueId, content }` (valueId = the token's service id); clicking an EMPTY area passes no payload. The host (decorated-form.ts) appends a new token on an empty-area click and edits the clicked token in place (prefixing 'Edited ') when a valueId is present. Test: click an empty part of the Allergies field — a new token is added and the Token count goes up; click an existing token — its text changes in place and the count stays the same; click Reset — the list clears."
        type: label
        span: 24
